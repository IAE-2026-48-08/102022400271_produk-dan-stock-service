type Query {
    products: [Product!]! @all
    product(id: ID! @eq): Product @find
}

type Mutation {
    createProduct(
        name: String!
        price: Float!
        stock: Int!
    ): Product @create

    updateProduct(
        id: ID!
        name: String
        price: Float
        stock: Int
    ): Product @update

    deleteProduct(
        id: ID!
    ): Product @delete
}

type Product {
    id: ID!
    name: String!
    price: Float!
    stock: Int!
    created_at: String
    updated_at: String
}